name: Deploy Supabase Push Function

on:
  push:
    branches:
      - main # Trigger on push to the main branch
    paths:
      - 'supabase/functions/push/**'
      - 'supabase/functions/service-account.json'
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Trial # ✅ Use secrets from the "Trial" environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cache Deno dependencies
      - name: Cache Deno Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ runner.os }}-deno-${{ hashFiles('**/*.ts') }}
          restore-keys: |
            ${{ runner.os }}-deno-

      - name: Setup Deno (for Supabase Edge Functions)
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest # Or a specific version like '1.62.0'

      - name: Create service-account.json
        run: |
          echo "${{ secrets.SERVICE_ACCOUNT_JSON }}" > supabase/functions/service-account.json
        shell: bash

      - name: Login to Supabase CLI
        run: supabase login --access-token "${{ secrets.SUPABASE_ACCESS_TOKEN }}"

      - name: Deploy Push Function
        run: |
          supabase functions deploy push \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Clean up service-account.json
        run: rm supabase/functions/service-account.json

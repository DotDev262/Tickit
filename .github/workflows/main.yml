# .github/workflows/main.yml
name: Supabase Reminder Cron

on:
  schedule:
    # Runs every 5 minutes
    # Adjust cron schedule as needed.
    # For example, '0 * * * *' for every hour
    # or '*/5 * * * *' for every 5 minutes.
    # Learn more: https://crontab.guru/
    - cron: '*/5 * * * *'

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use the same Node.js version as in your cron-script/package.json engines

      - name: Install cron script dependencies
        run: npm install
        working-directory: cron-script

      - name: Run reminder script
        run: node index.js
        working-directory: cron-script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EDGE_FUNCTION_URL: ${{ secrets.EDGE_FUNCTION_URL }}